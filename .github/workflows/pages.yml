name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - graphify-out/graph.html
      - graphify-out/graph.json
      - graphify-out/GRAPH_REPORT.md
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages artifact
        shell: bash
        run: |
          set -euo pipefail

          test -f graphify-out/graph.html

          mkdir -p _site
          cp graphify-out/graph.html _site/index.html
          cp graphify-out/graph.html _site/graph.html

          if [ -f graphify-out/graph.json ]; then
            cp graphify-out/graph.json _site/graph.json
          fi

          if [ -f graphify-out/GRAPH_REPORT.md ]; then
            cp graphify-out/GRAPH_REPORT.md _site/GRAPH_REPORT.md
          fi

          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
